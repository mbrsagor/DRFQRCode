services:
  web:
    build: .
    container_name: DRFQRCode
    restart: always
    env_file:
      - .env.docker
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    networks:
      - my_network
    entrypoint: ["sh", "./entrypoint.sh"]
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "DRFQRCode.asgi:application"]

  db:
    image: postgres:16-alpine
    container_name: project_postgres
    restart: always
    env_file:
      - .env.docker
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - my_network
  
  redis:
    image: redis:7-alpine
    container_name: project_redis
    ports:
      - "6379:6379"
    networks:
      - my_network

  nginx:
    image: nginx:stable-alpine
    container_name: project_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - my_network

volumes:
  pg_data:

networks:
  my_network:
    driver: bridge

